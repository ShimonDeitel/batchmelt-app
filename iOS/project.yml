name: BatchMelt
options:
  bundleIdPrefix: com.shimondeitel.metalcastlog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  BatchMelt:
    type: application
    platform: iOS
    sources:
      - path: BatchMelt
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.metalcastlog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: BatchMelt/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  BatchMeltTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: BatchMeltTests
      - path: BatchMelt.storekit
    dependencies:
      - target: BatchMelt
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.metalcastlog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  BatchMeltUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: BatchMeltUITests
    dependencies:
      - target: BatchMelt
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.metalcastlog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  BatchMelt:
    build:
      targets:
        BatchMelt: all
        BatchMeltTests: [test]
        BatchMeltUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: BatchMelt.storekit
    test:
      config: Debug
      storeKitConfiguration: BatchMelt.storekit
      targets:
        - BatchMeltTests
        - BatchMeltUITests
    archive:
      config: Release
